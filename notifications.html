<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CivicFix — Notifications</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="min-h-screen transition-colors duration-300 page-bg-mesh dark:bg-gray-950">
<div id="navbar"></div>
<main class="max-w-2xl mx-auto px-4 sm:px-6 py-8 pt-24 pb-24">
  <div class="flex items-center justify-between mb-6 fade-in-up">
    <div>
      <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white">Notifications</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5" id="notif-sub">Loading…</p>
    </div>
    <button onclick="markAllRead()" id="mark-all-btn" class="btn-secondary text-sm">Mark all read</button>
  </div>
  <!-- Filter tabs -->
  <div class="flex gap-2 mb-5 overflow-x-auto pb-1">
    <button onclick="filterNotifs('all',this)" class="notif-filter-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full bg-violet-600 text-white transition-all">All</button>
    <button onclick="filterNotifs('unread',this)" class="notif-filter-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 transition-all">Unread</button>
    <button onclick="filterNotifs('progress',this)" class="notif-filter-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 transition-all">🔧 Updates</button>
    <button onclick="filterNotifs('upvote',this)" class="notif-filter-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 transition-all">👍 Upvotes</button>
    <button onclick="filterNotifs('nearby',this)" class="notif-filter-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 transition-all">📍 Nearby</button>
    <button onclick="filterNotifs('resolved',this)" class="notif-filter-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 transition-all">✅ Resolved</button>
  </div>
  <div id="notif-list" class="space-y-2 stagger-children"></div>
</main>

<!-- Review Modal -->
<div id="review-modal" class="hidden fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl w-full max-w-md p-6 scale-in">
    <h2 class="text-lg font-bold text-gray-900 dark:text-white mb-1">Share Your Experience</h2>
    <p class="text-sm text-gray-500 mb-4">How was the resolution of this issue?</p>
    <div id="review-issue-preview" class="mb-4 p-3 bg-gray-50 dark:bg-gray-800 rounded-xl"></div>
    <!-- Stars -->
    <div class="flex gap-2 justify-center mb-4" id="star-rating">
      ${[1,2,3,4,5].map(n=>`<button type="button" onclick="setRating(${n})" class="star-btn text-3xl text-gray-300 hover:text-yellow-400 transition-colors" data-star="${n}">★</button>`).join('')}
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Your feedback</label>
      <textarea id="review-text" rows="3" placeholder="How was the fix? Was it done properly?" class="form-input resize-none"></textarea>
    </div>
    <div class="flex gap-3 mt-4">
      <button onclick="document.getElementById('review-modal').classList.add('hidden')" class="btn-secondary flex-1 justify-center">Skip</button>
      <button onclick="submitReview()" class="btn-primary flex-1 justify-center">Submit Review</button>
    </div>
  </div>
</div>

<div id="bottom-nav" class="bottom-nav md:hidden"></div>

<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
let notifFilter = 'all';
let selectedRating = 0;
let reviewIssueId = null;

const NOTIF_ICONS = {
  progress:  { bg:'bg-blue-100 dark:bg-blue-900/30',   icon:'bg-blue-500'   },
  upvote:    { bg:'bg-indigo-100 dark:bg-indigo-900/30',icon:'bg-violet-500' },
  escalated: { bg:'bg-orange-100 dark:bg-orange-900/30',icon:'bg-orange-500' },
  resolved:  { bg:'bg-green-100 dark:bg-green-900/30',  icon:'bg-green-500'  },
  nearby:    { bg:'bg-teal-100 dark:bg-teal-900/30',    icon:'bg-teal-500'   },
  review:    { bg:'bg-yellow-100 dark:bg-yellow-900/30',icon:'bg-yellow-500' },
  submitted: { bg:'bg-purple-100 dark:bg-purple-900/30',icon:'bg-purple-500' },
};

function getFilteredNotifs() {
  if (notifFilter === 'all') return userNotifs;
  if (notifFilter === 'unread') return userNotifs.filter(n => !n.read);
  return userNotifs.filter(n => n.type === notifFilter);
}

function renderNotifList() {
  const filtered = getFilteredNotifs();
  const unread = userNotifs.filter(n=>!n.read).length;
  document.getElementById('notif-sub').textContent = unread > 0 ? `${unread} unread notification${unread>1?'s':''}` : 'All caught up ✓';

  if (filtered.length === 0) {
    document.getElementById('notif-list').innerHTML = `<div class="text-center py-16"><div class="text-5xl mb-3">🔔</div><h3 class="font-semibold text-gray-700 dark:text-gray-300 mb-1">No notifications here</h3><p class="text-sm text-gray-500">Check back later.</p></div>`;
    return;
  }

  document.getElementById('notif-list').innerHTML = filtered.map(n => {
    const style = NOTIF_ICONS[n.type] || NOTIF_ICONS.progress;
    const issue = n.issueId ? ISSUES.find(i=>i.id===n.issueId) : null;
    return `
      <div class="notif-item ${n.read?'':'unread'} rounded-2xl p-4 flex items-start gap-3 cursor-pointer transition-all hover:shadow-md"
           onclick="handleNotifClick(${n.id},${n.issueId||'null'},'${n.type}')">
        <div class="w-10 h-10 ${style.bg} rounded-xl flex items-center justify-center flex-shrink-0 text-lg">${n.icon}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2">
            <p class="text-sm font-semibold ${n.read?'text-gray-700 dark:text-gray-300':'text-gray-900 dark:text-white'}">${n.title}</p>
            <div class="flex items-center gap-1.5 flex-shrink-0">
              <span class="text-xs text-gray-400 whitespace-nowrap">${n.time}</span>
              ${!n.read?'<div class="w-2 h-2 rounded-full bg-violet-500 flex-shrink-0"></div>':''}
            </div>
          </div>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5 line-clamp-2">${n.body}</p>
          ${issue ? `<div class="flex items-center gap-2 mt-2 flex-wrap">
            <span class="text-[10px] bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-0.5 rounded-full">${getCategoryInfo(issue.category).icon} ${getCategoryInfo(issue.category).label}</span>
            <span class="text-[10px] ${getHeatColor(issue.heatScore).light} ${getHeatColor(issue.heatScore).text} px-2 py-0.5 rounded-full font-semibold">🔥 ${issue.heatScore}</span>
            ${n.type==='review'?`<button onclick="event.stopPropagation();openReview(${issue.id})" class="text-[10px] bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400 px-2 py-0.5 rounded-full font-semibold hover:bg-yellow-200 transition-colors">⭐ Leave Review</button>`:''}
          </div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function filterNotifs(f, btn) {
  notifFilter = f;
  document.querySelectorAll('.notif-filter-btn').forEach(b=>{b.className='notif-filter-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 transition-all';});
  btn.className='notif-filter-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full bg-violet-600 text-white transition-all';
  renderNotifList();
}

function handleNotifClick(id, issueId, type) {
  const n = userNotifs.find(n=>n.id===id);
  if (n && !n.read) { n.read = true; saveNotifs(); renderNotifList(); }
  if (type === 'review' && issueId) { openReview(issueId); return; }
  if (issueId) window.location.href = `issue.html?id=${issueId}`;
}

function markAllRead() {
  userNotifs.forEach(n => n.read = true);
  saveNotifs();
  renderNotifList();
  Toast.show('All notifications marked as read', 'success', 1500);
}

function openReview(issueId) {
  reviewIssueId = issueId;
  const issue = ISSUES.find(i=>i.id===issueId);
  if (!issue) return;
  document.getElementById('review-issue-preview').innerHTML = `
    <div class="flex items-center gap-3">
      <img src="${issue.image}" class="w-10 h-10 rounded-lg object-cover flex-shrink-0" onerror="this.src='https://placehold.co/40'"/>
      <div><p class="text-sm font-semibold text-gray-900 dark:text-white line-clamp-1">${issue.title}</p><p class="text-xs text-gray-500">${issue.location}</p></div>
      <span class="ml-auto text-xs text-green-600 font-semibold bg-green-100 dark:bg-green-900/30 px-2 py-0.5 rounded-full">Resolved ✅</span>
    </div>`;
  setRating(0);
  document.getElementById('review-text').value = '';
  document.getElementById('review-modal').classList.remove('hidden');
}

function setRating(n) {
  selectedRating = n;
  document.querySelectorAll('[data-star]').forEach(btn => {
    const star = parseInt(btn.dataset.star);
    btn.className = `star-btn text-3xl transition-colors ${star <= n ? 'text-yellow-400' : 'text-gray-300'} hover:text-yellow-400`;
  });
}

function submitReview() {
  if (selectedRating === 0) { Toast.show('Please select a rating', 'warning'); return; }
  const issue = ISSUES.find(i=>i.id===reviewIssueId);
  if (issue) {
    issue.reviews.push({ user: currentUser?.name || 'Anonymous', rating: selectedRating, text: document.getElementById('review-text').value || 'Good resolution!', date: new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) });
    // Mark review notif as read
    const rn = userNotifs.find(n=>n.type==='review'&&n.issueId===reviewIssueId);
    if (rn) rn.read = true;
    saveNotifs();
  }
  document.getElementById('review-modal').classList.add('hidden');
  Toast.show('Review submitted! ⭐ Thank you for your feedback', 'success', 3000);
  renderNotifList();
}

document.addEventListener('DOMContentLoaded',()=>{
  renderNavbar('notifications.html');
  renderBottomNav('notifications.html');
  renderNotifList();
});
</script>
</body>
</html>
