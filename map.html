<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CivicFix - Live Map</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    #map-view { width:100%; height:calc(100vh - 64px); position:relative; overflow:hidden; }
    #leaflet-map { width:100%; height:100%; }
    .leaflet-container { background:#dbeafe; font-family:inherit; }
    .leaflet-popup-content-wrapper { border-radius:18px; box-shadow:0 20px 45px rgba(15,23,42,0.18); }
    .leaflet-popup-content { margin:0; width:280px !important; }
    .leaflet-popup-tip { box-shadow:none; }
    .location-search-result { transition:background 0.15s; }
    .location-search-result:hover { background:#f5f3ff; }
    .dark .location-search-result:hover { background:#1e1b4b; }
    .issue-list-item { transition:all 0.15s ease; cursor:pointer; }
    .issue-list-item:hover { background:#f8fafc; }
    .dark .issue-list-item:hover { background:#273344; }
    .issue-list-item.active { background:#f5f3ff; border-left:3px solid #8b5cf6; }
    .dark .issue-list-item.active { background:#1e1b4b; border-left-color:#8b5cf6; }
    .cat-filter-btn { transition:all 0.15s ease; }
    .cat-filter-btn.active { background:linear-gradient(135deg,#8b5cf6,#14b8a6); color:white; box-shadow:0 2px 8px rgba(139,92,246,0.3); }
    .map-overlay-btn {
      background:rgba(255,255,255,0.94);
      border:1px solid rgba(226,232,240,0.95);
      box-shadow:0 18px 40px rgba(15,23,42,0.16);
      backdrop-filter:blur(16px);
    }
    .dark .map-overlay-btn {
      background:rgba(15,23,42,0.92);
      border-color:rgba(51,65,85,0.9);
    }
    .issue-marker {
      width:18px;
      height:18px;
      border-radius:9999px;
      border:3px solid rgba(255,255,255,0.95);
      box-shadow:0 10px 24px rgba(15,23,42,0.25);
    }
    .issue-marker.is-high {
      box-shadow:0 0 0 8px rgba(239,68,68,0.18), 0 10px 24px rgba(15,23,42,0.25);
      animation:markerPulse 2s ease-in-out infinite;
    }
    @keyframes markerPulse {
      0%,100% { box-shadow:0 0 0 6px rgba(239,68,68,0.16), 0 10px 24px rgba(15,23,42,0.25); }
      50% { box-shadow:0 0 0 12px rgba(239,68,68,0), 0 10px 24px rgba(15,23,42,0.25); }
    }
  </style>
</head>
<body class="min-h-screen transition-colors duration-300 dark:bg-gray-950">
  <div id="navbar"></div>

  <div class="flex pt-16" style="height:100vh">
    <div id="sidebar" class="hidden md:flex w-80 bg-white/95 dark:bg-gray-900/95 backdrop-blur border-r border-gray-200 dark:border-gray-700 flex-col z-20 shadow-xl" style="height:calc(100vh - 64px)">
      <div class="p-4 border-b border-gray-100 dark:border-gray-800">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-bold text-gray-900 dark:text-white text-base">Live Map</h2>
          <div id="live-dot" class="flex items-center gap-1.5 text-xs font-semibold text-teal-600">
            <div class="w-2 h-2 rounded-full bg-teal-500 animate-pulse"></div>Live
          </div>
        </div>

        <div class="relative mb-2">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
          <input type="text" id="location-search" placeholder="Search location or area..." class="form-input pl-9 text-sm pr-16" oninput="handleLocationSearch(this.value)" onkeydown="if(event.key==='Enter')searchLocation()"/>
          <button onclick="detectMyLocation()" title="Use my live location" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-lg transition-all" id="locate-btn" style="background:linear-gradient(135deg,#8b5cf6,#14b8a6)">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          </button>
        </div>

        <div id="location-dropdown" class="hidden bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-lg overflow-hidden mb-2 max-h-40 overflow-y-auto"></div>

        <div id="my-location-badge" class="hidden flex items-center gap-2 bg-violet-50 dark:bg-violet-900/20 text-violet-700 dark:text-violet-300 text-xs font-semibold px-3 py-2 rounded-xl">
          <div class="w-2 h-2 rounded-full bg-violet-500 animate-pulse"></div>
          <span id="my-location-text">Locating...</span>
          <button onclick="clearMyLocation()" class="ml-auto text-gray-400 hover:text-rose-500">x</button>
        </div>
      </div>

      <div class="px-4 py-2 border-b border-gray-100 dark:border-gray-800">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" id="issue-search" placeholder="Filter issues on map..." class="form-input pl-8 text-xs py-2" oninput="filterIssues(this.value)"/>
        </div>
      </div>

      <div class="px-4 py-2 border-b border-gray-100 dark:border-gray-800">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Filter by Category</p>
        <div class="flex flex-wrap gap-1.5" id="cat-filters"></div>
      </div>

      <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between">
        <div class="flex gap-3 text-xs">
          <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-rose-500"></span>High</span>
          <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-orange-400"></span>Med</span>
          <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-teal-500"></span>Low</span>
        </div>
        <span class="text-xs font-semibold text-gray-500 dark:text-gray-400" id="view-mode-copy">Markers</span>
      </div>

      <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-800 grid grid-cols-3 gap-2 text-center">
        <div><div class="text-lg font-extrabold text-gray-900 dark:text-white" id="sidebar-total">-</div><div class="text-[10px] text-gray-400">Shown</div></div>
        <div><div class="text-lg font-extrabold text-rose-500" id="sidebar-high">-</div><div class="text-[10px] text-gray-400">High</div></div>
        <div><div class="text-lg font-extrabold text-teal-500" id="sidebar-resolved">-</div><div class="text-[10px] text-gray-400">Resolved</div></div>
      </div>

      <div class="flex-1 overflow-y-auto" id="map-issue-list"></div>
    </div>

    <div class="flex-1 relative" id="map-view">
      <div id="map-canvas" class="w-full h-full relative overflow-hidden">
        <div id="leaflet-map" class="w-full h-full"></div>
      </div>

      <div class="absolute top-3 left-3 right-16 z-30 md:hidden">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
          <input type="text" id="mobile-location-search" placeholder="Search location..." class="form-input pl-9 shadow-xl bg-white/95 dark:bg-gray-900/95 backdrop-blur text-sm pr-10" oninput="handleLocationSearch(this.value,'mobile')" onkeydown="if(event.key==='Enter')searchLocation()"/>
          <button onclick="detectMyLocation()" class="absolute right-2 top-1/2 -translate-y-1/2 w-7 h-7 flex items-center justify-center rounded-lg" style="background:linear-gradient(135deg,#8b5cf6,#14b8a6)">
            <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          </button>
        </div>
      </div>

      <div id="mobile-location-dropdown" class="hidden absolute top-16 left-3 right-14 z-40 bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 shadow-2xl overflow-hidden md:hidden max-h-48 overflow-y-auto"></div>
      <div class="absolute top-3 right-3 z-30 flex flex-col gap-2">
        <button onclick="toggleMobileSidebar()" class="md:hidden bg-white/95 dark:bg-gray-900/95 backdrop-blur rounded-xl p-3 shadow-xl border border-gray-200 dark:border-gray-700">
          <svg class="w-5 h-5 text-violet-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/></svg>
        </button>
        <button onclick="toggleHeatmap()" id="heatmap-view-toggle" class="map-overlay-btn rounded-2xl px-4 py-3 text-sm font-semibold text-violet-700 dark:text-gray-100 transition-all hover:-translate-y-0.5">
          Heatmap View
        </button>
      </div>

      <div class="absolute bottom-6 right-4 z-30 flex flex-col gap-2">
        <a href="report.html" class="flex items-center gap-2 text-white font-bold text-sm px-4 py-2.5 rounded-xl shadow-xl transition-all hover:-translate-y-0.5" style="background:linear-gradient(135deg,#8b5cf6,#14b8a6)">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
          Report Here
        </a>
        <button onclick="toggleMapStyle()" id="map-style-btn" class="bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 text-xs font-semibold px-3 py-2.5 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 transition-all flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          Dark Map
        </button>
        <div class="flex flex-col bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
          <button onclick="zoomMap(1.15)" class="p-2 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 font-bold text-sm transition-colors">+</button>
          <div class="h-px bg-gray-200 dark:bg-gray-700"></div>
          <button onclick="zoomMap(0.87)" class="p-2 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 font-bold text-sm transition-colors">-</button>
        </div>
      </div>

      <div id="nearby-toast" class="hidden absolute bottom-6 left-4 z-30 max-w-xs bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-violet-200 dark:border-violet-700 p-4">
        <div class="flex items-center gap-2 mb-2">
          <div class="w-8 h-8 rounded-xl flex items-center justify-center text-white text-sm" style="background:linear-gradient(135deg,#8b5cf6,#14b8a6)">+</div>
          <div>
            <p class="text-xs font-bold text-gray-900 dark:text-white" id="nearby-toast-title">Issues near you</p>
            <p class="text-xs text-gray-500" id="nearby-toast-sub"></p>
          </div>
          <button onclick="document.getElementById('nearby-toast').classList.add('hidden')" class="ml-auto text-gray-400 hover:text-gray-600 text-xs">x</button>
        </div>
        <div id="nearby-toast-list" class="space-y-1"></div>
      </div>
    </div>
  </div>

  <div id="mobile-sidebar" class="md:hidden fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleMobileSidebar()"></div>
    <div class="absolute left-0 top-0 bottom-0 w-80 bg-white dark:bg-gray-900 shadow-2xl overflow-y-auto" style="padding-top:64px">
      <div class="p-4">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-bold text-gray-900 dark:text-white">Issues</h3>
          <button onclick="toggleMobileSidebar()" class="text-gray-400 hover:text-gray-600">x</button>
        </div>
        <div id="mobile-issue-list" class="space-y-1"></div>
      </div>
    </div>
  </div>

  <div id="bottom-nav" class="bottom-nav md:hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script>window.CIVICFIX_API_BASE_URL='https://civic-fix-tan9.onrender.com/api';</script>
  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script>
    let heatmapOn=false;
    let darkMapOn=false;
    let issueSearch='';
    let catFilter='all';
    let locSearchTimer=null;
    let leafletMap=null;
    let baseTileLayer=null;
    let darkTileLayer=null;
    let markerLayerGroup=null;
    let heatLayer=null;
    let areaZoneLayerGroup=null;
    let userMarkerLayer=null;
    let userRadiusLayer=null;
    let liveRefreshTimer=null;
    let activePopupIssueId=null;
    let userMapPos={lat:null,lng:null,label:null};
    const markersByIssueId=new Map();

    function escapeHtml(value=''){
      return String(value)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function getPinColor(score){
      if(score>=80) return { fill:'#ef4444' };
      if(score>=60) return { fill:'#f97316' };
      if(score>=40) return { fill:'#eab308' };
      return { fill:'#14b8a6' };
    }

    function getIssueLatLng(issue){
      const lat=Number(issue?.lat ?? issue?.location?.lat);
      const lng=Number(issue?.lng ?? issue?.location?.lng);
      if(!Number.isFinite(lat)||!Number.isFinite(lng)) return null;
      return [lat,lng];
    }

    function getCatIcon(categoryId){
      return getCategoryInfo(categoryId).icon || '!';
    }

    function initializeLeafletMap(){
      if(leafletMap) return;
      leafletMap=L.map('leaflet-map',{zoomControl:false,preferCanvas:true}).setView([12.9716,77.5946],12);
      baseTileLayer=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        maxZoom:19,
        attribution:'&copy; OpenStreetMap contributors'
      }).addTo(leafletMap);
      darkTileLayer=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
        maxZoom:19,
        attribution:'&copy; OpenStreetMap contributors &copy; CARTO'
      });
      markerLayerGroup=L.layerGroup().addTo(leafletMap);
      areaZoneLayerGroup=L.layerGroup().addTo(leafletMap);
      leafletMap.on('popupopen',(event)=>{
        const id=Number(event.popup.options.issueId);
        if(Number.isFinite(id)){
          activePopupIssueId=id;
          highlightIssueListItem(id);
        }
      });
      leafletMap.on('popupclose',()=>{
        activePopupIssueId=null;
        highlightIssueListItem(null);
      });
      window.addEventListener('resize',()=>leafletMap.invalidateSize());
    }

    function getFilteredIssues(){
      const q=issueSearch.toLowerCase();
      return ISSUES.filter((issue)=>{
        const latLng=getIssueLatLng(issue);
        if(!latLng) return false;
        const matchSearch=!q||issue.title.toLowerCase().includes(q)||issue.location.toLowerCase().includes(q)||issue.category.toLowerCase().includes(q);
        const matchCategory=catFilter==='all'||issue.category===catFilter;
        return matchSearch&&matchCategory;
      });
    }
    function getIssuePopupHtml(issue){
      const status=STATUSES[issue.status]||{label:issue.status,color:'bg-slate-100 text-slate-700'};
      const category=getCategoryInfo(issue.category);
      const color=getPinColor(issue.heatScore).fill;
      return `
        <div class="overflow-hidden rounded-[18px]">
          <div class="p-4">
            <div class="flex items-start justify-between gap-3">
              <div>
                <p class="text-sm font-bold text-slate-900">${escapeHtml(issue.title)}</p>
                <p class="mt-1 text-xs text-slate-500">${escapeHtml(issue.location)}</p>
              </div>
              <span class="rounded-full px-2 py-1 text-[11px] font-bold" style="background:${color}22;color:${color}">Heat ${issue.heatScore}</span>
            </div>
            <div class="mt-3 flex items-center gap-2 text-[11px] text-slate-500">
              <span class="rounded-full px-2 py-1 ${status.color}">${escapeHtml(status.label)}</span>
              <span>${category.icon} ${escapeHtml(category.label)}</span>
            </div>
            <div class="mt-3">
              <a href="issue.html?id=${issue.id}" class="inline-flex items-center rounded-xl bg-violet-50 px-3 py-1.5 text-xs font-semibold text-violet-700 hover:bg-violet-100">Open details</a>
            </div>
          </div>
        </div>`;
    }

    function getMarkerIcon(issue){
      const color=getPinColor(issue.heatScore).fill;
      const highClass=issue.heatScore>=80?'is-high':'';
      return L.divIcon({
        className:'',
        html:`<div class="issue-marker ${highClass}" style="background:${color}"></div>`,
        iconSize:[18,18],
        iconAnchor:[9,9],
        popupAnchor:[0,-8]
      });
    }

    function highlightIssueListItem(id){
      document.querySelectorAll('.issue-list-item').forEach((el)=>el.classList.remove('active'));
      if(id!=null){
        document.querySelector(`[data-list-id="${id}"]`)?.classList.add('active');
      }
    }

    function getSeverityBand(issueCount){
      if(issueCount>=5){
        return {
          label:'Severe',
          color:'#ef4444',
          fill:'rgba(239,68,68,0.22)',
          ring:1400
        };
      }
      if(issueCount>=3){
        return {
          label:'Moderate',
          color:'#eab308',
          fill:'rgba(234,179,8,0.22)',
          ring:1050
        };
      }
      return {
        label:'Low',
        color:'#22c55e',
        fill:'rgba(34,197,94,0.2)',
        ring:760
      };
    }

    function buildAreaHeatGroups(issues){
      const grouped=new Map();
      issues.forEach((issue)=>{
        const latLng=getIssueLatLng(issue);
        if(!latLng) return;
        const key=(issue.area||issue.location||`issue-${issue.id}`).trim();
        if(!grouped.has(key)){
          grouped.set(key,{
            key,
            label:issue.area||issue.location||'Unknown area',
            latTotal:0,
            lngTotal:0,
            issueCount:0,
            scoreTotal:0,
            topScore:0
          });
        }
        const bucket=grouped.get(key);
        bucket.latTotal+=latLng[0];
        bucket.lngTotal+=latLng[1];
        bucket.issueCount+=1;
        bucket.scoreTotal+=Number(issue.heatScore||0);
        bucket.topScore=Math.max(bucket.topScore,Number(issue.heatScore||0));
      });

      return [...grouped.values()].map((group)=>{
        const avgScore=Math.round(group.scoreTotal/group.issueCount);
        return {
          ...group,
          lat:group.latTotal/group.issueCount,
          lng:group.lngTotal/group.issueCount,
          heatScore:avgScore,
          densityScore:Math.min(100,group.issueCount*20)
        };
      }).sort((a,b)=>b.heatScore-a.heatScore);
    }

    function renderAreaSeverityZones(issues){
      areaZoneLayerGroup.clearLayers();
      const areaGroups=buildAreaHeatGroups(issues);

      areaGroups.forEach((area)=>{
        const severity=getSeverityBand(area.issueCount);
        L.circle([area.lat,area.lng],{
          radius:severity.ring + (area.issueCount-1)*120,
          color:severity.color,
          weight:2,
          fillColor:severity.color,
          fillOpacity:0.18
        }).addTo(areaZoneLayerGroup);

        const labelHtml=`
          <div style="min-width:112px;border:1px solid ${severity.color};background:rgba(255,255,255,0.95);color:#0f172a;border-radius:14px;padding:8px 10px;box-shadow:0 10px 28px rgba(15,23,42,0.18);text-align:center;">
            <div style="font-size:11px;font-weight:800;color:${severity.color};text-transform:uppercase;letter-spacing:0.04em;">${severity.label}</div>
            <div style="font-size:12px;font-weight:700;line-height:1.2;margin-top:2px;">${escapeHtml(area.label)}</div>
            <div style="font-size:11px;font-weight:700;margin-top:3px;">${area.issueCount} issue${area.issueCount===1?'':'s'} nearby</div>
          </div>`;

        const labelMarker=L.marker([area.lat,area.lng],{
          icon:L.divIcon({
            className:'',
            html:labelHtml,
            iconSize:[120,58],
            iconAnchor:[60,29]
          })
        });

        labelMarker.bindPopup(`
          <div class="p-3">
            <p class="text-sm font-bold text-slate-900">${escapeHtml(area.label)}</p>
            <p class="mt-1 text-xs text-slate-500">${severity.label} concentration area</p>
            <div class="mt-3 flex items-center gap-2 text-xs">
              <span class="rounded-full px-2 py-1 font-bold" style="background:${severity.fill};color:${severity.color}">${area.issueCount} issue${area.issueCount===1?'':'s'}</span>
              <span class="text-slate-500">Avg heat ${area.heatScore}</span>
            </div>
          </div>
        `);
        labelMarker.addTo(areaZoneLayerGroup);
      });
    }

    function renderMapVisualization(){
      const filtered=getFilteredIssues();
      markerLayerGroup.clearLayers();
      markersByIssueId.clear();
      areaZoneLayerGroup.clearLayers();
      if(heatLayer){
        leafletMap.removeLayer(heatLayer);
        heatLayer=null;
      }

      if(heatmapOn&&filtered.length){
        const heatPoints=filtered.map((issue)=>{
          const latLng=getIssueLatLng(issue);
          return [latLng[0],latLng[1],Math.max(0.05,Math.min(1,Number(issue.heatScore||0)/100))];
        });
        heatLayer=L.heatLayer(heatPoints,{
          radius:38,
          blur:18,
          maxZoom:12,
          minOpacity:0.35,
          max:1,
          gradient:{
            0.25:'#22c55e',
            0.55:'#eab308',
            0.8:'#ef4444',
            1.0:'#b91c1c'
          }
        }).addTo(leafletMap);
        renderAreaSeverityZones(filtered);
      }else{
        filtered.forEach((issue)=>{
          const latLng=getIssueLatLng(issue);
          const marker=L.marker(latLng,{icon:getMarkerIcon(issue)});
          marker.bindPopup(getIssuePopupHtml(issue),{issueId:issue.id});
          marker.addTo(markerLayerGroup);
          markersByIssueId.set(issue.id,marker);
        });
      }

      updateSidebarStats(filtered);
      renderIssueList(filtered);
      document.getElementById('view-mode-copy').textContent=heatmapOn?'Heatmap':'Markers';
    }

    function updateSidebarStats(filtered){
      document.getElementById('sidebar-total').textContent=filtered.length;
      document.getElementById('sidebar-high').textContent=filtered.filter((issue)=>issue.heatScore>=75).length;
      document.getElementById('sidebar-resolved').textContent=filtered.filter((issue)=>issue.status==='resolved').length;
    }

    function calculateDistanceKm(lat1,lng1,lat2,lng2){
      const toRad=(value)=>value*Math.PI/180;
      const radiusKm=6371;
      const dLat=toRad(lat2-lat1);
      const dLng=toRad(lng2-lng1);
      const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
      return radiusKm*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }

    function renderIssueList(filtered){
      const sorted=[...filtered].sort((a,b)=>b.heatScore-a.heatScore);
      const html=sorted.map((issue)=>{
        const color=getPinColor(issue.heatScore).fill;
        const latLng=getIssueLatLng(issue);
        const distance=userMapPos.lat!=null?calculateDistanceKm(latLng[0],latLng[1],userMapPos.lat,userMapPos.lng):null;
        return `
          <div class="issue-list-item px-4 py-3 border-b border-gray-100 dark:border-gray-800" data-list-id="${issue.id}" onclick="focusIssue(${issue.id})">
            <div class="flex items-start gap-2">
              <div class="w-2.5 h-2.5 rounded-full mt-1.5 flex-shrink-0" style="background:${color}"></div>
              <div class="flex-1 min-w-0">
                <p class="text-xs font-semibold text-gray-900 dark:text-white line-clamp-1">${escapeHtml(issue.title)}</p>
                <p class="text-xs text-gray-500 dark:text-gray-400">${escapeHtml(issue.location)}</p>
                <div class="flex items-center gap-2 mt-1 flex-wrap">
                  <span class="text-xs font-bold" style="color:${color}">Heat ${issue.heatScore}</span>
                  <span class="text-xs text-gray-400">.</span>
                  <span class="text-xs text-gray-400">${issue.daysOpen}d</span>
                  <span class="text-xs">${getCatIcon(issue.category)} ${escapeHtml(getCategoryInfo(issue.category).label)}</span>
                  ${distance!=null?`<span class="text-[10px] text-violet-600 font-semibold ml-auto">${distance.toFixed(1)}km</span>`:''}
                </div>
              </div>
            </div>
          </div>`;
      }).join('');

      const fallback='<div class="p-4 text-center text-sm text-gray-400">No issues match filters</div>';
      document.getElementById('map-issue-list').innerHTML=html||fallback;
      document.getElementById('mobile-issue-list').innerHTML=html||fallback;
    }

    function focusIssue(id){
      const issue=ISSUES.find((item)=>item.id===id);
      if(!issue||!leafletMap) return;
      const latLng=getIssueLatLng(issue);
      leafletMap.flyTo(latLng,Math.max(leafletMap.getZoom(),14),{duration:0.6});
      if(markersByIssueId.has(id)){
        markersByIssueId.get(id).openPopup();
      }else{
        activePopupIssueId=id;
        highlightIssueListItem(id);
        L.popup({issueId:id}).setLatLng(latLng).setContent(getIssuePopupHtml(issue)).openOn(leafletMap);
      }
      document.getElementById('mobile-sidebar').classList.add('hidden');
    }

    function showPopup(id){
      focusIssue(id);
    }

    function getAreaSuggestions(){
      return [...new Set(ISSUES.map((issue)=>issue.area).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
    }
    function handleLocationSearch(value,target='desktop'){
      clearTimeout(locSearchTimer);
      const dropId=target==='mobile'?'mobile-location-dropdown':'location-dropdown';
      const drop=document.getElementById(dropId);
      if(!value||value.length<2){
        drop.classList.add('hidden');
        return;
      }
      locSearchTimer=setTimeout(()=>{
        const matches=getAreaSuggestions().filter((area)=>area.toLowerCase().includes(value.toLowerCase())).slice(0,6);
        if(!matches.length){
          drop.classList.add('hidden');
          return;
        }
        drop.innerHTML=matches.map((area)=>`
          <div class="location-search-result flex items-center gap-2 px-3 py-2 cursor-pointer" onclick="selectLocation('${area.replace(/'/g,"\\'")}','${target}')">
            <svg class="w-3.5 h-3.5 text-violet-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
            <span class="text-sm text-gray-700 dark:text-gray-300">${escapeHtml(area)}</span>
          </div>`).join('');
        drop.classList.remove('hidden');
      },200);
    }

    function getAreaCenter(area){
      const matches=ISSUES.filter((issue)=>{
        const latLng=getIssueLatLng(issue);
        return latLng&&String(issue.area||issue.location||'').toLowerCase().includes(String(area||'').toLowerCase());
      });
      if(!matches.length) return null;
      const center=matches.reduce((acc,issue)=>{
        const latLng=getIssueLatLng(issue);
        acc.lat+=latLng[0];
        acc.lng+=latLng[1];
        return acc;
      },{lat:0,lng:0});
      return [center.lat/matches.length,center.lng/matches.length];
    }

    function selectLocation(area,target='desktop'){
      const inputId=target==='mobile'?'mobile-location-search':'location-search';
      const dropId=target==='mobile'?'mobile-location-dropdown':'location-dropdown';
      document.getElementById(inputId).value=area;
      document.getElementById('location-search').value=area;
      const mobileInput=document.getElementById('mobile-location-search');
      if(mobileInput) mobileInput.value=area;
      document.getElementById(dropId).classList.add('hidden');
      const center=getAreaCenter(area);
      if(center){
        leafletMap.flyTo(center,13,{duration:0.6});
        moveUserMarker(center[0],center[1],area,false);
      }else{
        Toast.show(`Showing ${area} area`,'info',2000);
      }
    }

    function searchLocation(){
      const value=document.getElementById('location-search').value||document.getElementById('mobile-location-search').value||'';
      if(value) selectLocation(value);
    }

    function moveUserMarker(lat,lng,label,realGPS=false){
      userMapPos={lat,lng,label};
      if(userMarkerLayer) leafletMap.removeLayer(userMarkerLayer);
      if(userRadiusLayer) leafletMap.removeLayer(userRadiusLayer);
      userMarkerLayer=L.circleMarker([lat,lng],{
        radius:9,
        color:'#ffffff',
        weight:3,
        fillColor:'#6366f1',
        fillOpacity:1
      }).addTo(leafletMap);
      userRadiusLayer=L.circle([lat,lng],{
        radius:700,
        color:'#8b5cf6',
        weight:1.5,
        fillColor:'#8b5cf6',
        fillOpacity:0.08
      }).addTo(leafletMap);
      document.getElementById('my-location-badge').classList.remove('hidden');
      document.getElementById('my-location-text').textContent=`Location: ${label}${realGPS?' (GPS)':''}`;
      document.getElementById('location-search').value=label;
      const mobileInput=document.getElementById('mobile-location-search');
      if(mobileInput) mobileInput.value=label;
      renderMapVisualization();
      if(realGPS) Toast.show('Live location detected','success',2200);
    }

    function clearMyLocation(){
      userMapPos={lat:null,lng:null,label:null};
      if(userMarkerLayer) leafletMap.removeLayer(userMarkerLayer);
      if(userRadiusLayer) leafletMap.removeLayer(userRadiusLayer);
      userMarkerLayer=null;
      userRadiusLayer=null;
      document.getElementById('my-location-badge').classList.add('hidden');
      document.getElementById('location-search').value='';
      const mobileInput=document.getElementById('mobile-location-search');
      if(mobileInput) mobileInput.value='';
      renderMapVisualization();
    }

    function showNearbyIssues(lat,lng){
      const nearby=ISSUES.map((issue)=>{
        const latLng=getIssueLatLng(issue);
        if(!latLng) return null;
        return { ...issue, distance:calculateDistanceKm(lat,lng,latLng[0],latLng[1]) };
      }).filter(Boolean).filter((issue)=>issue.distance<5).sort((a,b)=>a.distance-b.distance).slice(0,4);
      if(!nearby.length) return;
      document.getElementById('nearby-toast-title').textContent=`${nearby.length} issues near you`;
      document.getElementById('nearby-toast-sub').textContent='Within ~5km radius';
      document.getElementById('nearby-toast-list').innerHTML=nearby.map((issue)=>`
        <div class="flex items-center gap-2 text-xs cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg p-1" onclick="focusIssue(${issue.id})">
          <span class="font-bold" style="color:${getPinColor(issue.heatScore).fill}">${getCatIcon(issue.category)}</span>
          <span class="flex-1 font-medium text-gray-700 dark:text-gray-300 line-clamp-1">${escapeHtml(issue.title.substring(0,30))}</span>
          <span class="text-violet-600 font-semibold ml-auto">${issue.distance.toFixed(1)}km</span>
        </div>`).join('');
      document.getElementById('nearby-toast').classList.remove('hidden');
    }

    function detectMyLocation(){
      const btn=document.getElementById('locate-btn');
      btn.style.animation='spin 1s linear infinite';
      if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition((pos)=>{
          btn.style.animation='';
          const lat=Number(pos.coords.latitude.toFixed(5));
          const lng=Number(pos.coords.longitude.toFixed(5));
          saveLocation({lat,lng,label:'Your Location'});
          moveUserMarker(lat,lng,'Your Location',true);
          leafletMap.flyTo([lat,lng],Math.max(leafletMap.getZoom(),13),{duration:0.6});
          showNearbyIssues(lat,lng);
        },()=>{
          btn.style.animation='';
          moveUserMarker(12.9716,77.5946,'Bengaluru (approx)',false);
          Toast.show('Using approximate location','info',1800);
        },{enableHighAccuracy:true,timeout:8000});
      }else{
        btn.style.animation='';
        Toast.show('Geolocation not supported','warning');
      }
    }

    function autoDetectMyLocation(){
      if(!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition((pos)=>{
        const lat=Number(pos.coords.latitude.toFixed(5));
        const lng=Number(pos.coords.longitude.toFixed(5));
        saveLocation({lat,lng,label:'Your Location'});
        moveUserMarker(lat,lng,'Your Location',true);
        leafletMap.flyTo([lat,lng],Math.max(leafletMap.getZoom(),13),{duration:0.6});
        showNearbyIssues(lat,lng);
      },()=>{
        if(userLocation?.lat!=null&&userLocation?.lng!=null){
          moveUserMarker(Number(userLocation.lat),Number(userLocation.lng),userLocation.label||'Saved Location',false);
        }
      },{enableHighAccuracy:true,timeout:8000});
    }
    function filterIssues(value){
      issueSearch=value;
      renderMapVisualization();
      leafletMap.closePopup();
    }

    function setCatFilter(category,button){
      catFilter=category;
      document.querySelectorAll('.cat-filter-btn').forEach((btn)=>btn.classList.remove('active'));
      button.classList.add('active');
      renderMapVisualization();
      leafletMap.closePopup();
    }

    function renderCategoryFilters(){
      const container=document.getElementById('cat-filters');
      container.innerHTML=[
        `<button onclick="setCatFilter('all',this)" class="cat-filter-btn ${catFilter==='all'?'active':''} text-xs font-semibold px-2.5 py-1 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400">All</button>`,
        ...CATEGORIES.map((category)=>`<button onclick="setCatFilter('${category.id}',this)" class="cat-filter-btn ${catFilter===category.id?'active':''} text-xs font-semibold px-2.5 py-1 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400">${category.icon} ${escapeHtml(category.label)}</button>`)
      ].join('');
    }

    function toggleHeatmap(){
      heatmapOn=!heatmapOn;
      const button=document.getElementById('heatmap-view-toggle');
      button.textContent=heatmapOn?'Marker View':'Heatmap View';
      button.classList.toggle('text-violet-700',!heatmapOn);
      button.classList.toggle('text-white',heatmapOn);
      button.style.background=heatmapOn?'linear-gradient(135deg,#8b5cf6,#14b8a6)':'';
      renderMapVisualization();
      Toast.show(heatmapOn?'Heatmap enabled':'Marker view enabled','info',1500);
    }

    function toggleMapStyle(){
      darkMapOn=!darkMapOn;
      if(darkMapOn){
        if(leafletMap.hasLayer(baseTileLayer)) leafletMap.removeLayer(baseTileLayer);
        darkTileLayer.addTo(leafletMap);
      }else{
        if(leafletMap.hasLayer(darkTileLayer)) leafletMap.removeLayer(darkTileLayer);
        baseTileLayer.addTo(leafletMap);
      }
      document.getElementById('map-style-btn').textContent=darkMapOn?'Light Map':'Dark Map';
    }

    function zoomMap(factor){
      if(!leafletMap) return;
      if(factor>1) leafletMap.zoomIn();
      else leafletMap.zoomOut();
    }

    function toggleMobileSidebar(){
      document.getElementById('mobile-sidebar').classList.toggle('hidden');
    }

    async function refreshLiveMapData(silent=true){
      try{
        const issues=await window.CivicAPI.fetchIssues({ limit:100, sort:'heat' });
        syncIssues(issues);
        renderMapVisualization();
        if(!silent) Toast.show('Map data refreshed','success',1600);
      }catch(error){
        if(!silent) Toast.show(error.message||'Could not refresh map data','error');
      }
    }

    function startLiveRefresh(){
      if(liveRefreshTimer) clearInterval(liveRefreshTimer);
      liveRefreshTimer=setInterval(()=>refreshLiveMapData(true),30000);
    }

    document.addEventListener('DOMContentLoaded',async ()=>{
      renderNavbar('map.html');
      renderBottomNav('map.html');
      initializeLeafletMap();
      try{
        const [categories, issues] = await Promise.all([
          window.CivicAPI.fetchCategories(),
          window.CivicAPI.fetchIssues({ limit:100, sort:'heat' })
        ]);
        CATEGORIES.length=0;
        CATEGORIES.push(...categories);
        syncIssues(issues);
      }catch(error){
        Toast.show(error.message||'Could not load live map data','error');
      }

      renderCategoryFilters();
      renderMapVisualization();
      startLiveRefresh();

      autoDetectMyLocation();

      document.addEventListener('click',(event)=>{
        if(!event.target.closest('#location-search')&&!event.target.closest('#location-dropdown')){
          document.getElementById('location-dropdown').classList.add('hidden');
        }
        if(!event.target.closest('#mobile-location-search')&&!event.target.closest('#mobile-location-dropdown')){
          document.getElementById('mobile-location-dropdown').classList.add('hidden');
        }
      });
    });
  </script>
</body>
</html>
