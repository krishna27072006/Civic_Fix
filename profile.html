<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CivicFix — My Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="min-h-screen transition-colors duration-300 page-bg-mesh dark:bg-gray-950">
<div id="navbar"></div>

<main class="max-w-5xl mx-auto px-4 sm:px-6 py-8 pt-24 pb-24">

  <!-- Guest state -->
  <div id="guest-state" class="hidden text-center py-20">
    <div class="w-20 h-20 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    </div>
    <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-2">Sign in to view your profile</h2>
    <p class="text-gray-500 mb-4">Track your reported issues, upvotes, and contributions.</p>
    <a href="auth.html" class="btn-primary">Sign In</a>
  </div>

  <!-- Profile content -->
  <div id="profile-content" class="hidden">
    <!-- Header Card -->
    <div class="glass-card rounded-3xl p-6 mb-6 fade-in-up relative overflow-hidden">
      <div class="absolute top-0 right-0 w-48 h-48 bg-gradient-to-br from-indigo-500/10 to-purple-500/10 rounded-full -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
      <div class="flex flex-col sm:flex-row items-start sm:items-center gap-5 relative z-10">
        <!-- Avatar -->
        <div class="relative">
          <div id="avatar" class="w-20 h-20 rounded-2xl bg-gradient-to-br from-violet-500 to-teal-500 flex items-center justify-center text-white text-3xl font-extrabold shadow-xl shadow-indigo-200 dark:shadow-indigo-900">A</div>
          <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-green-400 rounded-full border-2 border-white dark:border-gray-900 flex items-center justify-center">
            <div class="w-2 h-2 rounded-full bg-white"></div>
          </div>
        </div>
        <!-- Info -->
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <h1 id="user-name" class="text-2xl font-extrabold text-gray-900 dark:text-white">User Name</h1>
            <span id="user-badge" class="hidden bg-gradient-to-r from-orange-400 to-pink-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">👑 Admin</span>
          </div>
          <p id="user-email" class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">email@example.com</p>
          <div class="flex items-center gap-4 mt-2 flex-wrap">
            <div class="flex items-center gap-1 text-xs text-gray-500">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              Joined <span id="user-joined">Apr 2026</span>
            </div>
            <div id="location-info" class="hidden flex items-center gap-1 text-xs text-gray-500">
              <svg class="w-3.5 h-3.5 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
              <span id="location-text">Bengaluru</span>
            </div>
          </div>
        </div>
        <!-- Actions -->
        <div class="flex gap-2 self-start">
          <button onclick="showEditModal()" class="btn-secondary text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            Edit
          </button>
          <button onclick="logout()" class="btn-danger text-sm">Sign Out</button>
        </div>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6 stagger-children">
      <div class="stat-card text-center">
        <div class="text-3xl font-extrabold text-violet-600 dark:text-violet-400 count-anim" id="stat-reported">0</div>
        <div class="text-xs text-gray-500 mt-1">Issues Reported</div>
      </div>
      <div class="stat-card text-center">
        <div class="text-3xl font-extrabold text-green-500 count-anim" id="stat-resolved">0</div>
        <div class="text-xs text-gray-500 mt-1">Resolved</div>
      </div>
      <div class="stat-card text-center">
        <div class="text-3xl font-extrabold text-purple-500 count-anim" id="stat-upvotes">0</div>
        <div class="text-xs text-gray-500 mt-1">Total Upvotes</div>
      </div>
      <div class="stat-card text-center">
        <div class="text-3xl font-extrabold text-orange-500 count-anim" id="stat-impact">0</div>
        <div class="text-xs text-gray-500 mt-1">Impact Score</div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <div class="glass-card rounded-2xl p-5 fade-in-up">
        <h3 class="font-bold text-gray-900 dark:text-white text-sm mb-3 flex items-center gap-2">
          <svg class="w-4 h-4 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          Monthly Activity
        </h3>
        <div id="profile-bar-chart"></div>
      </div>
      <div class="glass-card rounded-2xl p-5 fade-in-up">
        <h3 class="font-bold text-gray-900 dark:text-white text-sm mb-3 flex items-center gap-2">
          <svg class="w-4 h-4 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/></svg>
          My Issues by Category
        </h3>
        <div class="flex items-center gap-4">
          <svg id="cat-donut" viewBox="0 0 140 140" class="w-28 h-28 flex-shrink-0"></svg>
          <div id="cat-legend" class="flex-1 space-y-1"></div>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-gray-200 dark:border-gray-700 mb-5 gap-1 overflow-x-auto">
      <button onclick="switchTab('reported',this)" id="tab-reported" class="profile-tab active text-sm font-semibold px-4 py-2.5 text-violet-600 dark:text-violet-400 whitespace-nowrap">My Reports</button>
      <button onclick="switchTab('upvoted',this)" id="tab-upvoted" class="profile-tab text-sm font-semibold px-4 py-2.5 text-gray-500 dark:text-gray-400 hover:text-gray-900 whitespace-nowrap">Upvoted</button>
      <button onclick="switchTab('resolved',this)" id="tab-resolved" class="profile-tab text-sm font-semibold px-4 py-2.5 text-gray-500 dark:text-gray-400 hover:text-gray-900 whitespace-nowrap">Resolved</button>
      <button onclick="switchTab('settings',this)" id="tab-settings" class="profile-tab text-sm font-semibold px-4 py-2.5 text-gray-500 dark:text-gray-400 hover:text-gray-900 whitespace-nowrap">⚙️ Settings</button>
    </div>

    <!-- Tab content -->
    <div id="tab-content"></div>
  </div>
</main>

<!-- Edit Modal -->
<div id="edit-modal" class="hidden fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl w-full max-w-md p-6 scale-in">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-gray-900 dark:text-white">Edit Profile</h2>
      <button onclick="closeEditModal()" class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="space-y-4">
      <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Display Name</label><input type="text" id="edit-name" class="form-input"/></div>
      <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Phone</label><input type="tel" id="edit-phone" placeholder="+91 xxxxx xxxxx" class="form-input"/></div>
      <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Area / Locality</label>
        <div class="flex gap-2">
          <input type="text" id="edit-location" placeholder="Area, city or coordinates" class="form-input flex-1"/>
          <button type="button" onclick="refreshLocation()" class="btn-secondary px-3">📍</button>
        </div>
      </div>
      <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Notification Preferences</label>
        <div class="space-y-2">
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="notif-upvote" checked class="accent-indigo-600 rounded w-4 h-4"/><span class="text-sm text-gray-600 dark:text-gray-400">Notify when my issue gets upvoted</span></label>
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="notif-progress" checked class="accent-indigo-600 rounded w-4 h-4"/><span class="text-sm text-gray-600 dark:text-gray-400">Notify on progress updates</span></label>
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="notif-resolved" checked class="accent-indigo-600 rounded w-4 h-4"/><span class="text-sm text-gray-600 dark:text-gray-400">Notify when issue is resolved</span></label>
          <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="notif-nearby" checked class="accent-indigo-600 rounded w-4 h-4"/><span class="text-sm text-gray-600 dark:text-gray-400">Notify on nearby issues</span></label>
        </div>
      </div>
    </div>
    <div class="flex gap-3 mt-5">
      <button onclick="closeEditModal()" class="btn-secondary flex-1 justify-center">Cancel</button>
      <button onclick="saveProfile()" class="btn-primary flex-1 justify-center">Save Changes</button>
    </div>
  </div>
</div>

<div id="bottom-nav" class="bottom-nav md:hidden"></div>

<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
let activeProfileTab = 'reported';
let profileSummary = null;
const profileIssueLists = { reported: [], upvoted: [], resolved: [] };

function renderProfileContent() {
  const user = currentUser;
  const activityData = {
    labels: ['Reported', 'Upvoted', 'Resolved'],
    reported: [
      profileIssueLists.reported.length,
      profileIssueLists.upvoted.length,
      profileIssueLists.resolved.length
    ],
    resolved: [
      profileIssueLists.reported.filter((issue) => issue.status === 'resolved').length,
      profileIssueLists.upvoted.filter((issue) => issue.status === 'resolved').length,
      profileIssueLists.resolved.length
    ]
  };
  document.getElementById('avatar').textContent = user.avatar || user.name.charAt(0).toUpperCase();
  document.getElementById('user-name').textContent = user.name;
  document.getElementById('user-email').textContent = user.email || '';
  document.getElementById('user-joined').textContent = user.joinedAt ? new Date(user.joinedAt).toLocaleDateString('en-US',{month:'short',year:'numeric'}) : 'Apr 2026';
  if (user.isAdmin) document.getElementById('user-badge').classList.remove('hidden');
  if (userLocation) {
    document.getElementById('location-info').classList.remove('hidden');
    document.getElementById('location-text').textContent = userLocation.full || userLocation.area || 'Bengaluru';
  }

  // Stats
  const stats = profileSummary?.stats || { reportedCount:0, resolvedCount:0, totalUpvotes:0, impactScore:0 };
  animateCount('stat-reported', stats.reportedCount);
  animateCount('stat-resolved', stats.resolvedCount);
  animateCount('stat-upvotes', stats.totalUpvotes);
  animateCount('stat-impact', stats.impactScore);

  // Charts
  renderMiniBarChart('profile-bar-chart', activityData.labels, activityData.reported, activityData.resolved, 'Items','Resolved');
  const catData = (profileSummary?.categoryBreakdown || []).slice(0,5).map((c,i)=>({
    label: getCategoryInfo(c.category).label,
    value: c.count,
    color: ['#6366f1','#f97316','#22c55e','#ef4444','#eab308'][i % 5]
  }));
  renderDonutChart('cat-donut','cat-legend',catData);

  renderTab('reported');
}

function animateCount(id, target) {
  const el = document.getElementById(id);
  let count = 0;
  const step = Math.max(1, Math.ceil(target/30));
  const interval = setInterval(()=>{count=Math.min(count+step,target);el.textContent=count;if(count>=target)clearInterval(interval);},40);
}

function switchTab(tab, btn) {
  activeProfileTab = tab;
  document.querySelectorAll('.profile-tab').forEach(b=>{b.classList.remove('active','text-violet-600','dark:text-violet-400');b.classList.add('text-gray-500','dark:text-gray-400');});
  btn.classList.add('active','text-violet-600','dark:text-violet-400');
  btn.classList.remove('text-gray-500','dark:text-gray-400');
  renderTab(tab);
}

function renderTab(tab) {
  const content = document.getElementById('tab-content');
  if (tab === 'reported') {
    const myIssues = profileIssueLists.reported;
    if (myIssues.length === 0) {
      content.innerHTML = `<div class="text-center py-16">
        <div class="text-5xl mb-3">📝</div>
        <h3 class="font-semibold text-gray-700 dark:text-gray-300 mb-1">No issues reported yet</h3>
        <p class="text-sm text-gray-500 mb-4">Start by reporting a civic issue in your area.</p>
        <a href="report.html" class="btn-primary">Report Issue</a>
      </div>`;
      return;
    }
    content.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 stagger-children">${myIssues.map(i=>IssueCard(i)).join('')}</div>`;
  } else if (tab === 'upvoted') {
    const upvoted = profileIssueLists.upvoted;
    if (upvoted.length === 0) {
      content.innerHTML = `<div class="text-center py-16"><div class="text-5xl mb-3">👍</div><h3 class="font-semibold text-gray-700 dark:text-gray-300 mb-1">No upvoted issues</h3><p class="text-sm text-gray-500">Upvote issues to see them here.</p></div>`;
      return;
    }
    content.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 stagger-children">${upvoted.map(i=>IssueCard(i)).join('')}</div>`;
  } else if (tab === 'resolved') {
    const resolved = profileIssueLists.resolved;
    if (resolved.length === 0) {
      const samp = ISSUES.filter(i=>i.status==='resolved');
      content.innerHTML = `<div class="space-y-3">${samp.map(i=>`
        <div class="glass-card rounded-xl p-4 flex items-center gap-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors" onclick="window.location.href='issue.html?id=${i.id}'">
          <div class="w-12 h-12 bg-green-100 dark:bg-green-900/30 rounded-xl flex items-center justify-center flex-shrink-0"><span class="text-xl">✅</span></div>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-sm text-gray-900 dark:text-white line-clamp-1">${i.title}</p>
            <p class="text-xs text-gray-500">${i.location} · Resolved in ${i.daysOpen} days</p>
          </div>
          <div class="flex flex-col items-end gap-1">
            ${i.reviews.length>0?`<div class="flex">${getStars(Math.round(i.reviews.reduce((s,r)=>s+r.rating,0)/i.reviews.length))}</div>`:''}
            <span class="text-xs text-green-600 font-semibold">Resolved</span>
          </div>
        </div>`).join('')}</div>`;
      return;
    }
    content.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 stagger-children">${resolved.map(i=>IssueCard(i)).join('')}</div>`;
  } else if (tab === 'settings') {
    content.innerHTML = `
      <div class="space-y-4 max-w-xl">
        <div class="glass-card rounded-2xl p-5">
          <h3 class="font-bold text-gray-900 dark:text-white mb-4">Account Settings</h3>
          <div class="space-y-4">
            <div class="flex items-center justify-between py-2 border-b border-gray-100 dark:border-gray-800">
              <div><p class="text-sm font-semibold text-gray-900 dark:text-white">Dark Mode</p><p class="text-xs text-gray-500">Toggle dark/light theme</p></div>
              <button onclick="toggleDarkMode()" class="w-12 h-6 rounded-full relative transition-colors ${darkMode?'bg-violet-500':'bg-gray-200 dark:bg-gray-700'} cursor-pointer">
                <span class="absolute top-1 ${darkMode?'left-7':'left-1'} w-4 h-4 bg-white rounded-full shadow transition-all"></span>
              </button>
            </div>
            <div class="flex items-center justify-between py-2 border-b border-gray-100 dark:border-gray-800">
              <div><p class="text-sm font-semibold text-gray-900 dark:text-white">Location Services</p><p class="text-xs text-gray-500">${userLocation?`Active — ${userLocation.full||userLocation.area}`:'Not enabled'}</p></div>
              <button onclick="refreshLocation()" class="btn-secondary text-xs py-1.5 px-3">${userLocation?'Update':'Enable'}</button>
            </div>
            <div class="flex items-center justify-between py-2 border-b border-gray-100 dark:border-gray-800">
              <div><p class="text-sm font-semibold text-gray-900 dark:text-white">Push Notifications</p><p class="text-xs text-gray-500">For issue updates near you</p></div>
              <button class="w-12 h-6 rounded-full relative bg-violet-500 cursor-pointer"><span class="absolute top-1 left-7 w-4 h-4 bg-white rounded-full shadow"></span></button>
            </div>
            <div class="flex items-center justify-between py-2">
              <div><p class="text-sm font-semibold text-gray-900 dark:text-white">Anonymous Reports</p><p class="text-xs text-gray-500">Hide your name on future reports</p></div>
              <button class="w-12 h-6 rounded-full relative bg-gray-200 dark:bg-gray-700 cursor-pointer"><span class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full shadow"></span></button>
            </div>
          </div>
        </div>
        <div class="glass-card rounded-2xl p-5">
          <h3 class="font-bold text-gray-900 dark:text-white mb-3">Danger Zone</h3>
          <div class="flex gap-2 flex-wrap">
            <button onclick="logout()" class="btn-danger text-sm">Sign Out</button>
            <button onclick="Toast.show('Account deletion coming soon','info')" class="text-xs font-semibold text-red-600 hover:text-red-700 underline">Delete Account</button>
          </div>
        </div>
      </div>`;
  }
}

function showEditModal() {
  document.getElementById('edit-name').value = currentUser.name || '';
  document.getElementById('edit-phone').value = currentUser.phone || '';
  document.getElementById('edit-location').value = userLocation?.full || userLocation?.area || '';
  document.getElementById('notif-upvote').checked = currentUser.notifyUpvote ?? true;
  document.getElementById('notif-progress').checked = currentUser.notifyProgress ?? true;
  document.getElementById('notif-resolved').checked = currentUser.notifyResolved ?? true;
  document.getElementById('notif-nearby').checked = currentUser.notifyNearby ?? true;
  document.getElementById('edit-modal').classList.remove('hidden');
}
function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }
function saveProfile() {
  const name = document.getElementById('edit-name').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  const loc = document.getElementById('edit-location').value.trim();
  const parts = name.split(' ');
  const locationParts = loc.split(',').map((part) => part.trim()).filter(Boolean);
  const area = locationParts[0] || null;
  const city = locationParts[1] || currentUser.city || 'Bengaluru';
  window.CivicAPI.updateProfile({
    firstName: parts[0] || currentUser.firstName || currentUser.name,
    lastName: parts.slice(1).join(' ') || currentUser.lastName || '',
    phone: phone || null,
    area,
    city,
    lat: userLocation?.lat ?? currentUser.lat ?? null,
    lng: userLocation?.lng ?? currentUser.lng ?? null,
    notifyUpvote: document.getElementById('notif-upvote').checked,
    notifyProgress: document.getElementById('notif-progress').checked,
    notifyResolved: document.getElementById('notif-resolved').checked,
    notifyNearby: document.getElementById('notif-nearby').checked
  }).then((user)=>{
    currentUser = syncCurrentUser(user);
    if (loc) {
      saveLocation({
        lat: userLocation?.lat ?? user.lat ?? null,
        lng: userLocation?.lng ?? user.lng ?? null,
        area: user.area || area,
        city: user.city || city,
        full: loc
      });
    }
    closeEditModal();
    Toast.show('Profile updated!', 'success');
    renderProfileContent();
  }).catch((error)=>Toast.show(error.message||'Could not update profile','error'));
}
function refreshLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const lat = Number(pos.coords.latitude.toFixed(5));
      const lng = Number(pos.coords.longitude.toFixed(5));
      const full = `Lat ${lat}, Lng ${lng}`;
      saveLocation({lat, lng, area: null, city:'Bengaluru', full});
      document.getElementById('edit-location').value=full;
      Toast.show('Location updated','success');
    },()=>Toast.show('Location access denied','warning'));
  }
}

async function loadProfileData(){
  const [summary, reported, upvoted, resolved] = await Promise.all([
    window.CivicAPI.fetchProfileSummary(),
    window.CivicAPI.fetchProfileIssues('reported'),
    window.CivicAPI.fetchProfileIssues('upvoted'),
    window.CivicAPI.fetchProfileIssues('resolved')
  ]);
  profileSummary = summary;
  profileIssueLists.reported = reported;
  profileIssueLists.upvoted = upvoted;
  profileIssueLists.resolved = resolved;
  syncIssues([...reported, ...upvoted, ...resolved].filter((issue, index, arr)=>arr.findIndex((i)=>i.id===issue.id)===index));
  currentUser = syncCurrentUser(summary.user);
}

document.addEventListener('DOMContentLoaded', async ()=>{
  renderNavbar('profile.html');
  renderBottomNav('profile.html');
  if (!currentUser) { document.getElementById('guest-state').classList.remove('hidden'); }
  else {
    document.getElementById('profile-content').classList.remove('hidden');
    try{
      await loadProfileData();
      renderProfileContent();
    }catch(error){
      Toast.show(error.message||'Could not load profile','error');
    }
  }
});
</script>
</body>
</html>
